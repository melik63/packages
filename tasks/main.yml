---
# tasks/main.yml

- name: Enable CRB repository
  ansible.builtin.yum_repository:
    name: crb
    state: present
    description: "CentOS-$releasever - CodeReady Builder"
    baseurl: "$contentdir/$releasever-stream/CRB/$basearch/os"
    gpgcheck: yes
    enabled: "{{ crb_repo_enabled }}"
    gpgkey: file:///etc/pki/rpm-gpg/RPM-GPG-KEY-centosofficial
  ignore_errors: yes  # Ignore if already configured/duplicated
  when: ansible_distribution == 'CentOS' or ansible_distribution == 'RedHat'

- name: Check if EPEL repo file exists
  ansible.builtin.stat:
    path: "{{ epel_repofile_path }}"
  register: epel_repofile_stat

- name: Import EPEL GPG key
  ansible.builtin.rpm_key:
    state: present
    key: "{{ epel_repo_gpg_key_url }}"

- name: Install EPEL repository
  ansible.builtin.dnf:
    name: "{{ epel_repo_url }}"
    state: present
    disable_gpg_check: no
  register: epel_install_result
  until: epel_install_result is succeeded
  retries: 3
  delay: 5
  when: not epel_repofile_stat.stat.exists

- name: Update DNF cache
  ansible.builtin.dnf:
    update_cache: yes
  when: epel_install_result is changed

- name: Run distro-sync
  ansible.builtin.command: dnf -y distro-sync
  register: distro_sync
  changed_when: distro_sync.rc == 0
  tags: [system]

- name: Install base packages
  ansible.builtin.dnf:
    name: "{{ centos_base_packages }}"
    state: latest
    update_cache: yes
  tags: [packages]

- name: Set system timezone
  timezone:
    name: "{{ centos_timezone }}"
  tags: [system]

- name: Ensure chronyd is enabled and running
  systemd:
    name: chronyd
    enabled: yes
    state: started
  tags: [system]

- name: Apply sysctl tuning parameters
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    sysctl_set: yes
    state: present
    reload: yes
  loop:
    - { key: 'net.ipv4.ip_forward', value: '0' }
    - { key: 'net.ipv4.conf.all.send_redirects', value: '0' }
    - { key: 'net.ipv4.tcp_syncookies', value: '1' }
    - { key: 'vm.swappiness', value: '10' }
  tags: [sysctl]

- name: Ensure firewalld is enabled and running
  systemd:
    name: firewalld
    enabled: yes
    state: started
  tags: [security]

- name: Allow SSH service in firewalld
  firewalld:
    service: ssh
    permanent: yes
    state: enabled
    immediate: yes
  tags: [security]

- name: Create administrative user
  user:
    name: "{{ centos_admin_user }}"
    groups: wheel
    append: yes
    create_home: yes
    shell: /bin/bash
  tags: [users]

- name: Set authorized SSH key for admin user
  authorized_key:
    user: "{{ centos_admin_user }}"
    state: present
    key: "{{ centos_admin_ssh_key }}"
  when: centos_admin_ssh_key | length > 0
  tags: [users, ssh]

- name: Harden SSH configuration
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    validate: 'sshd -t -f %s'
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin {{ centos_ssh_permit_root_login }}' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ centos_ssh_password_authentication }}' }
    - { regexp: '^#?PubkeyAuthentication', line: 'PubkeyAuthentication {{ centos_ssh_pubkey_authentication }}' }
  notify: Restart SSH
  tags: [security, ssh]

- name: Configure sudoers for wheel group
  lineinfile:
    path: /etc/sudoers
    state: present
    regexp: '^%wheel'
    line: '%wheel ALL=(ALL) {{ "NOPASSWD: " if centos_sudo_nopasswd else "" }}ALL'
    validate: 'visudo -cf %s'
  tags: [users, sudo]

- name: Stop and disable firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: stopped
    enabled: false

- name: Set SELinux to disabled mode
  ansible.posix.selinux:
    state: disabled

- name: Reboot to apply SELinux changes
  ansible.builtin.reboot:
